# nixpacks.toml

[phases.setup]
aptPkgs = ['ffmpeg']

[phases.build]
dependsOn = ['setup']
cmds = [
  'pip install --no-cache-dir -r requirements.txt',
  'ffmpeg -version || echo "ffmpeg nie znaleziono po instalacji!"'   # ← debug w logach build
]

[phases.start]
cmd = 'export PATH="/usr/bin:$PATH" && python main.py'   # ← kluczowe: explicit PATH

[providers]
python = { version = "3.11" }

