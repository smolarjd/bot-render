# nixpacks.toml

[setup]
nixPkgs = ["ffmpeg"]

[build]
dependsOn = ['setup']
cmds = [
  'pip install --no-cache-dir -r requirements.txt',
  'ffmpeg -version || echo "ffmpeg nie znaleziono po instalacji!"'   # ← debug w logach build
]

[start]
cmd = 'export PATH="/nix/var/nix/profiles/default/bin:/usr/bin:$PATH" && python main.py'

[providers]
python = { version = "3.11" }



